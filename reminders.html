<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <link rel="icon" href="data:," />
  <link rel="manifest" href="./manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/app.css" />
  <title>TimeScape Planner — Reminders</title>
</head>
<body>
  <header>
    <a href="index.html#inbox" class="header-btn" aria-label="Inbox"><span>📥</span><span style="font-size:0.75rem">Inbox</span></a>
    <span style="flex:1;text-align:center">📅 TimeScape Planner</span>
    <a href="index.html#settings" class="header-btn" aria-label="Settings"><span>⚙️</span><span style="font-size:0.75rem">Settings</span></a>
  </header>

  <section class="reminders" style="max-width:640px;margin:18px auto;padding:0 12px;box-sizing:border-box">
    <div id="reminderHeader">
      <h2 style="text-align:center">⏰ Reminders</h2>
    </div>

    <div id="reminderBar" aria-live="polite"></div>

    <form id="reminderForm" style="margin-top:12px">
      <div class="mobile-row" style="gap:8px;align-items:center">
        <label class="mobile-label" for="reminderDate">Date</label>
        <input id="reminderDate" type="date" />
      </div>
      <div style="margin-top:8px" class="mobile-row">
        <label class="mobile-label" for="reminderInput">Reminder</label>
        <input type="text" id="reminderInput" placeholder="Add reminder..." />
      </div>
      <div style="margin-top:8px" class="mobile-row">
        <label class="mobile-label" for="reminderTime">Time</label>
        <input type="time" id="reminderTime" style="width:36%" />
        <button id="addReminderBtn" type="submit" style="width:auto;margin-left:8px">Add Reminder</button>
      </div>
    </form>
  </section>

  <!-- bottom ribbon navigation -->
  <nav class="bottom-ribbon" role="navigation" aria-label="App pages">
    <a href="index.html#personal" class="r-item"><span>👤</span><span class="r-label">Personal</span></a>
    <a href="index.html#calendar" class="r-item"><span>🗓️</span><span class="r-label">Calendar</span></a>
    <a href="index.html#today" class="r-item r-center"><span>🏠</span><span class="r-label">Today</span></a>
    <a href="index.html#home" class="r-item"><span>🏡</span><span class="r-label">Home</span></a>
    <a href="index.html#work" class="r-item"><span>💼</span><span class="r-label">Work</span></a>
  </nav>


  <script src="./assets/app.js"></script>
</body>
</html>
