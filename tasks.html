<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="description" content="TimeScape Planner Tasks — organise your to-dos, track progress, and stay on top of every project." />
  <meta name="keywords" content="tasks, to-do, checklist, productivity, planner, iOS" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="TimeScape Planner — Tasks" />
  <meta property="og:description" content="Organise your to-dos, track progress, and stay on top of every project." />
  <meta property="og:image" content="assets/icon.svg" />
  <link rel="icon" href="data:," />
  <link rel="manifest" href="./manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <title>TimeScape Planner — Tasks</title>
  <link rel="stylesheet" href="./assets/app.css" />
  <link rel="stylesheet" href="./assets/ios-native.css" />
  <!-- Resolve og:image to absolute URL at runtime -->
  <script>try{var _b=new URL('assets/icon.svg',location.href).href;var _m=document.querySelector('meta[property="og:image"]');if(_m)_m.setAttribute('content',_b);}catch(e){}</script>
  <!-- Redirect to the SPA; noscript fallback for crawlers -->
  <script>location.replace('./index.html#tasks');</script>
  <noscript><meta http-equiv="refresh" content="0;url=./index.html#tasks" /></noscript>
</head>
<body>
  <header>
    <a href="index.html#inbox" class="header-btn" aria-label="Inbox"><span>📥</span><span style="font-size:0.75rem">Inbox</span></a>
    <span style="flex:1;text-align:center">📅 TimeScape Planner</span>
    <button type="button" class="header-btn" id="headerAddItemBtn" aria-label="Add Item"><span>＋</span><span class="header-btn-label">Add</span></button>
    <a href="index.html#settings" class="header-btn" aria-label="Settings"><span>⚙️</span><span style="font-size:0.75rem">Settings</span></a>
  </header>

  <section class="tasks" style="max-width:640px;margin:18px auto;padding:0 12px;box-sizing:border-box">
    <h2 style="text-align:center">✅ Tasks</h2>


    <ul id="taskList" style="margin-top:12px"></ul>
  </section>

  <!-- edit modal -->
  <div id="editModal" role="dialog" aria-modal="true">
    <div class="panel">
      <h3 id="editModalHeading">Edit</h3>
      <form id="editForm">
        <input type="hidden" id="editKind" />
        <input type="hidden" id="editEventId" />
        <input type="hidden" id="editTaskIndex" />
        <input type="hidden" id="editReminderKey" />
        <input type="hidden" id="editReminderIndex" />
        <div style="margin-top:8px;">
          <label for="editText">Text / Title</label>
          <input id="editText" type="text" />
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <div style="flex:1">
            <label for="editDate">Date</label>
            <input id="editDate" type="date" />
          </div>
          <div style="width:140px">
            <label for="editTime">Time</label>
            <input id="editTime" type="time" />
          </div>
        </div>
        <div id="editFieldsExtra" style="margin-top:8px">
          <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
            <div style="flex:1">
              <label for="editEmoji">Emoji</label>
              <input id="editEmoji" type="text" placeholder="🎉" />
            </div>
            <div style="width:140px">
              <label for="editCategory">Category</label>
              <select id="editCategory">
                <option value="work">work</option>
                <option value="personal">personal</option>
                <option value="errands">errands</option>
              </select>
            </div>
            <div style="width:120px">
              <label for="editPriority">Priority</label>
              <select id="editPriority">
                <option value="1">!</option><option value="2">!!</option><option value="3">!!!</option>
              </select>
            </div>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
          <button type="button" id="cancelEdit" class="small-btn">Cancel</button>
          <button type="submit" id="saveEdit" style="background:#4a90e2;color:#fff;border:none;padding:8px 12px;border-radius:10px">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- bottom ribbon navigation -->
  <nav class="bottom-ribbon" role="navigation" aria-label="App pages">
    <a href="index.html#personal" class="r-item"><span>👤</span><span class="r-label">Personal</span></a>
    <a href="index.html#calendar" class="r-item"><span>🗓️</span><span class="r-label">Calendar</span></a>
    <a href="index.html#today" class="r-item r-center"><span>🏠</span><span class="r-label">Today</span></a>
    <a href="index.html#home" class="r-item"><span>🏡</span><span class="r-label">Home</span></a>
    <a href="index.html#work" class="r-item"><span>💼</span><span class="r-label">Work</span></a>
  </nav>


  <script src="./assets/app.js"></script>
</body>
</html>
